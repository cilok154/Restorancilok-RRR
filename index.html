```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restoran Cilok - Pesan Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @keyframes scan {
            0%, 100% { top: 10%; }
            50% { top: 85%; }
        }

        .animate-scan {
            animation: scan 2s ease-in-out infinite;
        }

        .step-transition {
            display: none;
        }

        .step-active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-sky-50 text-gray-900 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-20 px-4 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-sky-500 p-2 rounded-lg">
                <i data-lucide="star" class="text-white w-5 h-5 fill-current"></i>
            </div>
            <h1 class="font-bold text-xl tracking-tight text-sky-700 italic">Restoran Cilok</h1>
        </div>
        <div id="header-info" class="hidden flex flex-col items-end">
            <div class="flex items-center gap-2 bg-sky-100 text-sky-700 px-3 py-1 rounded-full text-xs font-bold border border-sky-200">
                <i data-lucide="table" class="w-3 h-3"></i>
                Meja <span id="display-table">0</span>
            </div>
            <span id="display-name" class="text-[10px] text-sky-400 font-medium mr-2">Nama</span>
        </div>
    </header>

    <main class="flex-1 max-w-2xl mx-auto w-full p-4 pb-32">
        
        <!-- STEP 1: Pemilihan Meja & Nama -->
        <section id="step-table" class="step-transition step-active space-y-6">
            <div class="text-center space-y-2 py-6">
                <h2 class="text-3xl font-extrabold text-sky-700">Selamat Datang! ✨</h2>
                <p class="text-gray-500">Silahkan isi nama dan pilih nomor meja favoritmu.</p>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-sky-100 shadow-sm space-y-4">
                <label class="block">
                    <span class="text-sm font-bold text-sky-600 ml-1">Nama Pemesan</span>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="h-5 w-5 text-sky-300"></i>
                        </div>
                        <input
                            id="input-name"
                            type="text"
                            class="block w-full pl-10 pr-3 py-4 border border-sky-100 rounded-2xl leading-5 bg-sky-50/30 placeholder-sky-200 focus:outline-none focus:ring-2 focus:ring-sky-500 font-bold transition-all"
                            placeholder="Masukkan nama kamu..."
                        />
                    </div>
                </label>
            </div>

            <div class="grid grid-cols-3 sm:grid-cols-4 gap-4" id="table-grid">
                <!-- Meja di-generate via JS -->
            </div>
        </section>

        <!-- STEP 2: Menu -->
        <section id="step-menu" class="step-transition space-y-6">
            <div class="sticky top-20 z-10 bg-sky-50/95 backdrop-blur-sm py-2">
                <div class="flex gap-2 p-1 bg-sky-100/50 rounded-2xl overflow-x-auto no-scrollbar border border-sky-100" id="category-tabs">
                    <!-- Tabs di-generate via JS -->
                </div>
            </div>
            <div class="grid gap-4" id="menu-container">
                <!-- Menu di-generate via JS -->
            </div>
        </section>

        <!-- STEP 3: Keranjang -->
        <section id="step-cart" class="step-transition space-y-6">
            <div class="flex items-center gap-4">
                <button onclick="changeStep('menu')" class="p-2 hover:bg-sky-100 rounded-full transition-colors">
                    <i data-lucide="chevron-left" class="w-6 h-6 text-sky-600"></i>
                </button>
                <h2 class="text-xl font-bold text-sky-700">Pesanan Saya</h2>
            </div>
            <div id="cart-items" class="space-y-3"></div>
            <div id="cart-summary" class="bg-white p-6 rounded-2xl border border-sky-50 shadow-sm space-y-4"></div>
        </section>

        <!-- STEP 4: Pembayaran -->
        <section id="step-payment" class="step-transition space-y-6">
            <div class="flex items-center gap-4">
                <button onclick="changeStep('cart')" class="p-2 hover:bg-sky-100 rounded-full">
                    <i data-lucide="chevron-left" class="w-6 h-6 text-sky-600"></i>
                </button>
                <h2 class="text-xl font-bold text-sky-700">Pilih Pembayaran</h2>
            </div>
            <div class="grid gap-3" id="payment-options"></div>
            <div id="qris-area" class="hidden"></div>
        </section>

        <!-- STEP 5: Sukses -->
        <section id="step-success" class="step-transition text-center py-8 space-y-6">
            <!-- Konten sukses di-generate via JS -->
        </section>

    </main>

    <!-- Bottom Navigation -->
    <div id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-sky-50 safe-bottom shadow-[0_-5px_20px_-10px_rgba(14,165,233,0.2)] z-30">
        <div class="max-w-2xl mx-auto" id="nav-content"></div>
    </div>

    <script>
        // DATA
        const MENU_CATEGORIES = [
            {
                id: 'makanan', name: 'Makanan', icon: 'soup',
                items: [
                    { id: 1, name: 'Soto Mie Bogor', price: 28000, desc: 'Mie kuning, bihun, daging sapi, risol.', img: 'https://images.unsplash.com/photo-1582878826629-29b7ad1cdc43?q=80&w=300&auto=format&fit=crop' },
                    { id: 6, name: 'Ayam Serundeng', price: 25000, desc: 'Ayam goreng bumbu kuning krispi.', img: 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?q=80&w=300&auto=format&fit=crop' }
                ]
            },
            {
                id: 'minuman', name: 'Minuman', icon: 'coffee',
                items: [
                    { id: 2, name: 'Es Teh Manis', price: 5000, desc: 'Teh melati segar gula asli.', img: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?q=80&w=300&auto=format&fit=crop' },
                    { id: 4, name: 'Cappuccino', price: 20000, desc: 'Espresso dengan susu foam lembut.', img: 'https://images.unsplash.com/photo-1534778101976-62847782c213?q=80&w=300&auto=format&fit=crop' }
                ]
            }
        ];

        // STATE
        let currentStep = 'table';
        let customerName = '';
        let selectedTable = null;
        let activeCategory = 'makanan';
        let cart = [];
        let paymentMethod = '';
        let isScanning = false;

        // UTILS
        const formatCurrency = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);

        // INITIALIZE
        function init() {
            renderTables();
            renderCategoryTabs();
            renderMenu();
            renderPaymentOptions();
            lucide.createIcons();
        }

        // RENDERING
        function renderTables() {
            const grid = document.getElementById('table-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const btn = document.createElement('button');
                btn.className = `aspect-square flex flex-col items-center justify-center border-2 rounded-2xl transition-all group shadow-sm bg-white border-sky-100 hover:border-sky-400 hover:bg-sky-50 active:scale-95`;
                btn.innerHTML = `<span class="text-xs text-sky-200 group-hover:text-sky-400 font-medium">MEJA</span><span class="text-2xl font-black text-sky-700">${i}</span>`;
                btn.onclick = () => selectTable(i);
                grid.appendChild(btn);
            }
        }

        function renderCategoryTabs() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = MENU_CATEGORIES.map(cat => `
                <button onclick="setActiveCategory('${cat.id}')" class="flex-none min-w-[100px] flex items-center justify-center gap-2 py-3 px-4 rounded-xl font-bold transition-all ${activeCategory === cat.id ? 'bg-white text-sky-700 shadow-sm ring-1 ring-sky-200' : 'text-gray-400'}">
                    <i data-lucide="${cat.icon}" class="w-4 h-4"></i> ${cat.name}
                </button>
            `).join('');
            lucide.createIcons();
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            const items = MENU_CATEGORIES.find(c => c.id === activeCategory).items;
            container.innerHTML = items.map(item => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-sky-50 flex gap-4 relative">
                    <img src="${item.img}" class="w-20 h-20 rounded-xl object-cover" />
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-gray-800">${item.name}</h3>
                            <p class="text-gray-400 text-[10px] line-clamp-1">${item.desc}</p>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <span class="font-black text-sky-600">${formatCurrency(item.price)}</span>
                            <button onclick="addToCart(${item.id})" class="bg-sky-500 text-white px-3 py-1.5 rounded-xl text-xs font-bold active:scale-95">
                                <i data-lucide="plus" class="w-3 h-3 inline"></i> Tambah
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderCart() {
            const list = document.getElementById('cart-items');
            const summary = document.getElementById('cart-summary');
            
            if (cart.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-400">Keranjang kosong</div>`;
                summary.innerHTML = '';
                return;
            }

            list.innerHTML = cart.map(item => `
                <div class="bg-white p-4 rounded-2xl border border-sky-50 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-sky-100 rounded-lg flex items-center justify-center font-bold text-sky-600">${item.qty}x</div>
                        <div>
                            <p class="font-bold text-sm text-gray-800">${item.name}</p>
                            <p class="text-xs text-sky-500">${formatCurrency(item.price)}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="updateQty(${item.id}, -1)" class="p-1 bg-sky-50 rounded-lg text-sky-400"><i data-lucide="minus" class="w-4 h-4"></i></button>
                        <button onclick="updateQty(${item.id}, 1)" class="p-1 bg-sky-50 rounded-lg text-sky-600"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');

            const subt = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const tx = subt * 0.1;
            const tot = subt + tx;

            summary.innerHTML = `
                <div class="flex justify-between border-b border-sky-50 pb-2">
                    <h3 class="font-bold text-sky-700">Ringkasan</h3>
                    <span class="text-[10px] bg-sky-50 px-2 py-1 rounded text-sky-500 font-bold uppercase">${customerName}</span>
                </div>
                <div class="space-y-1 text-sm text-gray-500">
                    <div class="flex justify-between"><span>Subtotal</span><span>${formatCurrency(subt)}</span></div>
                    <div class="flex justify-between"><span>Pajak (10%)</span><span>${formatCurrency(tx)}</span></div>
                    <div class="flex justify-between pt-2 border-t border-sky-50 font-black text-lg text-sky-700">
                        <span>Total Akhir</span><span>${formatCurrency(tot)}</span>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderPaymentOptions() {
            const container = document.getElementById('payment-options');
            const methods = [
                { id: 'qris', label: 'QRIS', icon: 'qr-code', color: 'bg-sky-100 text-sky-600' },
                { id: 'cash', label: 'Tunai di Kasir', icon: 'store', color: 'bg-gray-100 text-gray-600' }
            ];
            container.innerHTML = methods.map(m => `
                <button onclick="selectPayment('${m.id}')" class="flex items-center gap-4 p-5 rounded-3xl border-2 bg-white transition-all ${paymentMethod === m.id ? 'border-sky-400 bg-sky-50' : 'border-sky-50'}">
                    <div class="w-10 h-10 flex items-center justify-center rounded-xl ${m.color}"><i data-lucide="${m.icon}"></i></div>
                    <div class="text-left flex-1"><p class="font-bold text-gray-800">${m.label}</p></div>
                    ${paymentMethod === m.id && !isScanning ? '<i data-lucide="check-circle-2" class="text-sky-500"></i>' : ''}
                </button>
            `).join('');
            lucide.createIcons();
        }

        // ACTIONS
        function changeStep(newStep) {
            document.querySelectorAll('.step-transition').forEach(el => el.classList.remove('step-active'));
            document.getElementById(`step-${newStep}`).classList.add('step-active');
            currentStep = newStep;
            
            // Bottom Nav control
            const nav = document.getElementById('bottom-nav');
            if (newStep === 'table' || newStep === 'success') {
                nav.classList.add('hidden');
            } else {
                nav.classList.remove('hidden');
                renderBottomNav();
            }

            if (newStep === 'cart') renderCart();
        }

        function selectTable(num) {
            const nameInput = document.getElementById('input-name').value;
            if (!nameInput.trim()) {
                alert("Tolong isi nama kamu dulu ya!");
                return;
            }
            customerName = nameInput;
            selectedTable = num;
            
            document.getElementById('header-info').classList.remove('hidden');
            document.getElementById('display-table').innerText = num;
            document.getElementById('display-name').innerText = nameInput;
            
            changeStep('menu');
        }

        function setActiveCategory(id) {
            activeCategory = id;
            renderCategoryTabs();
            renderMenu();
        }

        function addToCart(id) {
            let allItems = [];
            MENU_CATEGORIES.forEach(c => allItems = [...allItems, ...c.items]);
            const item = allItems.find(i => i.id === id);
            
            const existing = cart.find(i => i.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...item, qty: 1 });
            }
            renderBottomNav();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            renderCart();
            renderBottomNav();
        }

        function selectPayment(id) {
            paymentMethod = id;
            const qrisArea = document.getElementById('qris-area');
            
            if (id === 'qris') {
                isScanning = true;
                qrisArea.classList.remove('hidden');
                renderPaymentOptions();
                renderBottomNav();
                
                // Animasi Scan
                qrisArea.innerHTML = `
                    <div class="bg-gray-900 rounded-[40px] p-8 aspect-square flex flex-col items-center justify-center space-y-6 relative overflow-hidden mt-4">
                        <div class="relative w-48 h-48 border-2 border-sky-400/30 rounded-3xl flex items-center justify-center">
                            <div class="absolute top-0 left-0 w-6 h-6 border-t-4 border-l-4 border-sky-400 rounded-tl-lg"></div>
                            <div class="absolute top-0 right-0 w-6 h-6 border-t-4 border-r-4 border-sky-400 rounded-tr-lg"></div>
                            <div class="absolute bottom-0 left-0 w-6 h-6 border-b-4 border-l-4 border-sky-400 rounded-bl-lg"></div>
                            <div class="absolute bottom-0 right-0 w-6 h-6 border-b-4 border-r-4 border-sky-400 rounded-br-lg"></div>
                            <i data-lucide="qr-code" class="w-32 h-32 text-sky-400/50"></i>
                            <div class="absolute left-2 right-2 h-1 bg-sky-400 shadow-[0_0_15px_rgba(56,189,248,0.8)] animate-scan"></div>
                        </div>
                        <div class="text-sky-400 animate-pulse font-bold text-sm tracking-widest">MEMINDAI QR...</div>
                    </div>
                `;
                lucide.createIcons();

                setTimeout(() => {
                    isScanning = false;
                    const subt = cart.reduce((a, b) => a + (b.price * b.qty), 0) * 1.1;
                    qrisArea.innerHTML = `
                        <div class="bg-white p-8 rounded-[40px] border-4 border-dashed border-sky-100 text-center space-y-4 shadow-xl mt-4 animate-in">
                            <div class="flex items-center justify-center gap-2"><span class="text-xl font-black text-sky-600">QRIS</span></div>
                            <div class="bg-sky-50 p-4 rounded-3xl border-8 border-sky-500 mx-auto w-fit">
                                <i data-lucide="qr-code" class="w-32 h-32 text-sky-600"></i>
                            </div>
                            <div class="bg-sky-600 py-3 rounded-2xl font-black text-white">${formatCurrency(subt)}</div>
                        </div>
                    `;
                    lucide.createIcons();
                    renderPaymentOptions();
                    renderBottomNav();
                }, 2000);
            } else {
                qrisArea.classList.add('hidden');
                isScanning = false;
                renderPaymentOptions();
                renderBottomNav();
            }
        }

        function handleFinalPayment() {
            const orderId = 'CILOK-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            const subt = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const tot = subt * 1.1;

            const successSection = document.getElementById('step-success');
            successSection.innerHTML = `
                <div class="w-20 h-20 bg-sky-100 rounded-full flex items-center justify-center mx-auto shadow-inner">
                                    <i data-lucide="check-circle-2" class="text-sky-500 w-12 h-12"></i>
                </div>
                <div class="space-y-1">
                    <h2 class="text-2xl font-black text-sky-700 uppercase">Pesanan Terkirim!</h2>
                    <p class="text-gray-400 text-sm">Kak <span class="font-bold text-sky-600">${customerName}</span>, pesanan meja ${selectedTable} segera datang!</p>
                </div>
                <div class="bg-white p-6 rounded-[32px] border border-sky-100 text-left space-y-4 max-w-sm mx-auto shadow-xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-sky-500"></div>
                    <div class="flex justify-between text-[10px] text-sky-300 font-bold uppercase tracking-widest">
                        <span>Struk Digital</span><span>Meja ${selectedTable}</span>
                    </div>
                    <p class="font-mono font-black text-center text-sky-700 tracking-widest py-2 border border-dashed border-sky-100 rounded-xl">${orderId}</p>
                    <div class="space-y-1">
                        ${cart.map(i => `<div class="flex justify-between text-xs"><span>${i.qty}x ${i.name}</span><span class="font-bold">${formatCurrency(i.price * i.qty)}</span></div>`).join('')}
                        <div class="border-t border-sky-50 pt-2 mt-2 font-black flex justify-between text-sky-700">
                            <span>Total</span><span>${formatCurrency(tot)}</span>
                        </div>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full max-w-sm bg-sky-500 text-white py-4 rounded-2xl font-bold shadow-xl">Pesan Lagi</button>
            `;
            lucide.createIcons();
            changeStep('success');
        }

        function renderBottomNav() {
            const content = document.getElementById('nav-content');
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const tot = cart.reduce((a, b) => a + (b.price * b.qty), 0) * 1.1;

            if (currentStep === 'menu') {
                content.innerHTML = `
                    <button onclick="changeStep('cart')" ${count === 0 ? 'disabled' : ''} class="w-full flex items-center justify-between p-4 rounded-2xl font-bold shadow-lg ${count > 0 ? 'bg-sky-500 text-white active:scale-95' : 'bg-gray-200 text-gray-400'}">
                        <div class="flex items-center gap-2">
                            <div class="bg-white/20 px-2.5 py-0.5 rounded-lg text-sm">${count}</div>
                            <span>Cek Pesanan</span>
                        </div>
                        <span>${formatCurrency(tot)}</span>
                    </button>
                `;
            } else if (currentStep === 'cart') {
                content.innerHTML = `
                    <button onclick="changeStep('payment')" class="w-full bg-sky-500 text-white p-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95">
                        Lanjut ke Pembayaran <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                `;
            } else if (currentStep === 'payment') {
                content.innerHTML = `
                    <button onclick="handleFinalPayment()" ${!paymentMethod || isScanning ? 'disabled' : ''} class="w-full p-4 rounded-2xl font-bold shadow-lg ${paymentMethod && !isScanning ? 'bg-sky-600 text-white active:scale-95' : 'bg-gray-200 text-gray-400'}">
                        ${isScanning ? 'Memindai...' : 'Konfirmasi Bayar'}
                    </button>
                `;
            }
            lucide.createIcons();
        }

        // START
        window.onload = init;
    </script>
</body>
</html>

```
